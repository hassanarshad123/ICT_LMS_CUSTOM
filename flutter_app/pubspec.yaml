name: ict_lms_student
description: Zensbot LMS - Student Learning App
publish_to: 'none'
version: 1.2.0+3

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Networking
  dio: ^5.8.0+1

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2

  # WebView (video player)
  webview_flutter: ^4.12.0

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.4
  package_info_plus: ^8.3.0
  path_provider: ^2.1.5

  # PDF viewing
  flutter_pdfview: ^1.3.2

  # WebSocket
  web_socket_channel: ^3.0.2

  # Screen protection (prevents screenshots and screen recording)
  screen_protector: ^1.4.2

  # Crash analytics
  sentry_flutter: ^8.12.0

  # Apple Liquid Glass UI
  liquid_glass_widgets:
    git:
      url: https://github.com/sdegenaar/liquid_glass_widgets.git
  liquid_glass: ^0.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0D1117"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
