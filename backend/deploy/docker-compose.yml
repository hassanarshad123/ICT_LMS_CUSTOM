services:
  lms-blue:
    image: lms-backend:${DEPLOY_IMAGE_TAG:-latest}
    container_name: lms-blue
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ../.env
    environment:
      - DEPLOY_SLOT=blue
      - GIT_SHA=${GIT_SHA:-unknown}
      # Both slots start the scheduler; per-job Redis ownership check in
      # sentry_job_wrapper enforces exactly-once semantics across slots.
      # Set to false only as an emergency kill-switch for all recurring jobs.
      - SCHEDULER_ENABLED=${BLUE_SCHEDULER:-true}
      - REDIS_URL=redis://host.docker.internal:6379/0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 512M

  lms-green:
    image: lms-backend:${DEPLOY_IMAGE_TAG:-latest}
    container_name: lms-green
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    env_file:
      - ../.env
    environment:
      - DEPLOY_SLOT=green
      - GIT_SHA=${GIT_SHA:-unknown}
      # Both slots start the scheduler; per-job Redis ownership check in
      # sentry_job_wrapper enforces exactly-once semantics across slots.
      # Set to false only as an emergency kill-switch for all recurring jobs.
      - SCHEDULER_ENABLED=${GREEN_SCHEDULER:-true}
      - REDIS_URL=redis://host.docker.internal:6379/0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 512M
