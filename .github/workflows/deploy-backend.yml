name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - .github/workflows/deploy-backend.yml
  pull_request:
    branches: [main]
    paths:
      - backend/**
      - .github/workflows/deploy-backend.yml

concurrency:
  group: backend-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Validate Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall -q app/ main.py

      - name: Import validation
        env:
          DATABASE_URL: postgresql+asyncpg://fake:fake@localhost/fake
          JWT_SECRET_KEY: ci-test-secret-not-real
        run: |
          python -c "
          import importlib, pkgutil, sys

          # Import the main entry point
          import main

          # Walk all app.* submodules to catch broken imports
          import app
          for importer, modname, ispkg in pkgutil.walk_packages(
              path=app.__path__,
              prefix='app.',
              onerror=lambda name: sys.exit(f'Failed to import {name}')
          ):
              importlib.import_module(modname)

          print('All modules imported successfully')
          "

  deploy:
    name: Deploy to Production (Blue-Green)
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://apiict.zensbot.site

    steps:
      - name: Blue-Green Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            cd /home/ubuntu/ICT_LMS_CUSTOM
            git fetch origin main
            git reset --hard origin/main
            cd backend/deploy
            chmod +x deploy-bg.sh rollback.sh
            ./deploy-bg.sh

      - name: External health check
        run: |
          sleep 5
          curl -sf --max-time 10 https://apiict.zensbot.site/api/health
          echo ""
          echo "External health check passed"
